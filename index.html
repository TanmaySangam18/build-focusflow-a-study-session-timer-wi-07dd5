<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusFlow — Study Timer & Tasks</title>
<style>
:root{
  --bg:#0f1220; --card:#1a1e33; --card2:#20264a; --accent:#7c5cff; --accent2:#4cd9c0;
  --text:#eef0fb; --muted:#9aa1c4; --danger:#ff6b6b; --good:#4cd9c0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:linear-gradient(135deg,#0f1220,#161a30);
  color:var(--text); min-height:100vh; padding:20px;
}
.wrap{max-width:900px;margin:0 auto}
header{text-align:center;margin-bottom:20px}
header h1{font-size:2rem;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
header p{color:var(--muted);font-size:.9rem}
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{background:var(--card);border:1px solid #2c3358;color:var(--muted);padding:10px 18px;border-radius:10px;cursor:pointer;font-size:.95rem;transition:.2s}
.tab-btn.active{background:var(--accent);color:#fff}
.view{display:none}
.view.active{display:block}
.card{background:var(--card);border-radius:16px;padding:22px;box-shadow:0 8px 24px rgba(0,0,0,.3);margin-bottom:16px}

/* Timer */
.timer-display{font-size:4rem;text-align:center;font-weight:700;letter-spacing:2px;margin:10px 0;font-variant-numeric:tabular-nums}
.mode-label{text-align:center;color:var(--accent2);font-weight:600;margin-bottom:10px;text-transform:uppercase;font-size:.85rem;letter-spacing:1px}
.timer-controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
button{cursor:pointer;border:none;border-radius:10px;padding:12px 20px;font-size:.95rem;font-weight:600;transition:.2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.15)}
.btn-secondary{background:var(--card2);color:var(--text)}
.btn-secondary:hover{background:#2a3160}
.btn-danger{background:var(--danger);color:#fff}
.settings-row{display:flex;gap:14px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.settings-row label{display:flex;flex-direction:column;font-size:.8rem;color:var(--muted);gap:4px;align-items:center}
.settings-row input{width:70px;padding:6px;border-radius:8px;border:1px solid #333a60;background:var(--card2);color:var(--text);text-align:center}

.stats-row{display:flex;justify-content:space-around;text-align:center;margin-top:10px}
.stats-row div span{display:block;font-size:1.4rem;font-weight:700;color:var(--accent2)}
.stats-row div small{color:var(--muted)}

/* Tasks */
.task-form{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.task-form input, .task-form select{flex:1;min-width:120px;padding:10px;border-radius:10px;border:1px solid #333a60;background:var(--card2);color:var(--text)}
.task-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.task-item{background:var(--card2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted)}
.task-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent)}
.task-text{flex:1}
.task-meta{font-size:.75rem;color:var(--muted)}
.priority-high{color:var(--danger);font-weight:700}
.priority-med{color:#ffc857;font-weight:700}
.priority-low{color:var(--good);font-weight:700}
.task-item button{padding:6px 10px;font-size:.8rem}
.empty{text-align:center;color:var(--muted);padding:20px}

.active-task{margin-top:10px;text-align:center;color:var(--muted);font-size:.9rem}
.active-task b{color:var(--accent2)}

@media(max-width:500px){
  .timer-display{font-size:2.8rem}
  .card{padding:16px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎯 FocusFlow</h1>
    <p>Pomodoro timer + task manager for focused studying</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-view="timer">⏱ Timer</button>
    <button class="tab-btn" data-view="tasks">📋 Tasks</button>
  </div>

  <section id="view-timer" class="view active">
    <div class="card">
      <div class="mode-label" id="modeLabel">Focus Session</div>
      <div class="timer-display" id="display">25:00</div>
      <div class="active-task" id="activeTaskLabel">No task selected</div>
      <div class="timer-controls">
        <button class="btn-primary" id="startBtn">Start</button>
        <button class="btn-secondary" id="pauseBtn">Pause</button>
        <button class="btn-secondary" id="resetBtn">Reset</button>
        <button class="btn-secondary" id="skipBtn">Skip</button>
      </div>
      <div class="settings-row">
        <label>Focus (min)<input type="number" id="focusMin" min="1" max="120" value="25"></label>
        <label>Short Break<input type="number" id="shortMin" min="1" max="60" value="5"></label>
        <label>Long Break<input type="number" id="longMin" min="1" max="60" value="15"></label>
        <label>Task<select id="taskSelect"><option value="">— none —</option></select></label>
      </div>
    </div>
    <div class="card">
      <div class="stats-row">
        <div><span id="statSessions">0</span><small>Sessions Today</small></div>
        <div><span id="statMinutes">0</span><small>Focus Minutes</small></div>
        <div><span id="statStreak">0</span><small>Total Sessions</small></div>
      </div>
    </div>
  </section>

  <section id="view-tasks" class="view">
    <div class="card">
      <div class="task-form">
        <input type="text" id="taskInput" placeholder="Add a new study task...">
        <select id="prioritySelect">
          <option value="low">Low</option>
          <option value="med" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <button class="btn-primary" id="addTaskBtn">Add</button>
      </div>
      <ul class="task-list" id="taskList"></ul>
    </div>
  </section>
</div>
<script src="app.js"></script>
</body>
</html>
